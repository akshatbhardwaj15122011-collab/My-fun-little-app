name: Build & Publish Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Compile APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Automatically sets up a global, working version of Gradle on the cloud machine
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper # This will automatically find or configure the correct gradle version

      # Compile the project using the global gradle system instead of ./gradlew
      - name: Build Release Unsigned APK
        run: gradle assembleRelease --no-daemon

      - name: Clean and Rename APK Asset
        run: |
          mkdir -p apk-output
          cp app/build/outputs/apk/release/app-release-unsigned.apk apk-output/BatterySurvivor-Release.apk
        continue-on-error: true

      - name: Create & Publish GitHub Release Page
        uses: softprops/action-gh-release@v2
        with:
          files: apk-output/BatterySurvivor-Release.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
