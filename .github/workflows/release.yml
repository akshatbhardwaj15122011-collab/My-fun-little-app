name: Build & Publish Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Compile APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper

      # Changed to assembleDebug to bypass the missing .jks keystore error completely
      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon

      - name: Clean and Rename APK Asset
        run: |
          mkdir -p apk-output
          cp app/build/outputs/apk/debug/app-debug.apk apk-output/BatterySurvivor-Release.apk
        continue-on-error: true

      - name: Create & Publish GitHub Release Page
        uses: softprops/action-gh-release@v2
        with:
          files: apk-output/BatterySurvivor-Release.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
